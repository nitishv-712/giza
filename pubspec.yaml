name: giza
description: Giza — underground music streaming via Audius + YouTube IFrame

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Storage ─────────────────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── YouTube ──────────────────────────────────────────────────────────────────
  youtube_player_flutter: ^9.1.1       # YouTube IFrame player widget
  youtube_explode_dart: ^2.3.3         # YouTube search — no API key needed

  # ── Networking ───────────────────────────────────────────────────────────────
  http: ^1.2.0

  # ── UI / Images ──────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
